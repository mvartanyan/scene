apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: scene

resources:
  - namespace.yaml
  - serviceaccounts.yaml
  - rbac.yaml
  - runtime-limits.yaml
  - configmap.yaml
  - app-deployment.yaml
  - dispatcher-deployment.yaml
  - service.yaml
  - ingress.yaml
  - network-policies.yaml
  - pod-disruption-budget.yaml
  - runner-readiness-job.yaml

replacements:
  - source:
      kind: ConfigMap
      name: scene-runtime
      fieldPath: data.SCENE_APP_IMAGE
    targets:
      - select:
          kind: Deployment
          name: scene-app
        fieldPaths:
          - spec.template.spec.containers.[name=scene].image
      - select:
          kind: Deployment
          name: scene-dispatcher
        fieldPaths:
          - spec.template.spec.containers.[name=dispatcher].image
  - source:
      kind: ConfigMap
      name: scene-runtime
      fieldPath: data.SCENE_RUNNER_IMAGE
    targets:
      - select:
          kind: Job
          name: scene-runner-readiness
        fieldPaths:
          - spec.template.spec.containers.[name=runner-readiness].image
