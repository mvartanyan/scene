apiVersion: apps/v1
kind: Deployment
metadata:
  name: scene-dispatcher
  namespace: scene
  labels:
    app.kubernetes.io/name: scene
    app.kubernetes.io/component: dispatcher
    app.kubernetes.io/part-of: scene
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: scene
      app.kubernetes.io/component: dispatcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scene
        app.kubernetes.io/component: dispatcher
        app.kubernetes.io/part-of: scene
    spec:
      serviceAccountName: scene-dispatcher
      automountServiceAccountToken: true
      nodeSelector:
        kubernetes.io/arch: amd64
      imagePullSecrets:
        - name: scene-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 60
      containers:
        - name: dispatcher
          image: scene-app-image
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - app.services.dispatcher
          envFrom:
            - configMapRef:
                name: scene-runtime
            - secretRef:
                name: scene-app-aws
          env:
            - name: SCENE_PROCESS_ROLE
              value: dispatcher
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - kill -0 1
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - >-
                  import os; from datetime import datetime, timedelta, timezone;
                  from app.services.storage import get_repository; lease =
                  get_repository().dispatcher_status() or {}; assert
                  str(lease.get("owner", "")).startswith(os.environ["HOSTNAME"] + "-"),
                  lease; heartbeat =
                  datetime.fromisoformat(str(lease["heartbeat_at"]).replace("Z", "+00:00"));
                  capabilities =
                  datetime.fromisoformat(str(lease["capabilities_checked_at"]).replace("Z", "+00:00"));
                  assert heartbeat > datetime.now(timezone.utc) - timedelta(seconds=15),
                  lease; assert
                  datetime.fromisoformat(str(lease["expires_at"]).replace("Z", "+00:00"))
                  > datetime.now(timezone.utc), lease; assert
                  lease.get("capabilities_ok") is True, lease; assert
                  capabilities > datetime.now(timezone.utc) - timedelta(seconds=45),
                  lease
            failureThreshold: 2
            periodSeconds: 30
            timeoutSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
              ephemeral-storage: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
