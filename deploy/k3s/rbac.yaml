apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scene-job-dispatcher
  namespace: scene
  labels:
    app.kubernetes.io/name: scene
    app.kubernetes.io/component: dispatcher
rules:
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - delete
      - get
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
      - delete
      - get
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
  - apiGroups:
      - ""
    resources:
      - pods/log
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scene-job-dispatcher
  namespace: scene
  labels:
    app.kubernetes.io/name: scene
    app.kubernetes.io/component: dispatcher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: scene-job-dispatcher
subjects:
  - kind: ServiceAccount
    name: scene-dispatcher
    namespace: scene
