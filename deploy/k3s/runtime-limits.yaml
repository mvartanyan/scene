apiVersion: v1
kind: LimitRange
metadata:
  name: scene-runtime
  namespace: scene
  labels:
    app.kubernetes.io/name: scene
    app.kubernetes.io/part-of: scene
spec:
  limits:
    # KubernetesRunnerClient sets CPU and memory but currently omits ephemeral
    # storage. Admission fills these values on every generated runner container.
    - type: Container
      default:
        ephemeral-storage: 2Gi
      defaultRequest:
        ephemeral-storage: 512Mi
