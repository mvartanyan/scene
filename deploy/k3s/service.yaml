apiVersion: v1
kind: Service
metadata:
  name: scene
  namespace: scene
  labels:
    app.kubernetes.io/name: scene
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: scene
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: scene
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
