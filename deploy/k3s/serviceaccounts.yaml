apiVersion: v1
kind: ServiceAccount
metadata:
  name: scene-app
  namespace: scene
  labels:
    app.kubernetes.io/name: scene
    app.kubernetes.io/component: app
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: scene-dispatcher
  namespace: scene
  labels:
    app.kubernetes.io/name: scene
    app.kubernetes.io/component: dispatcher
automountServiceAccountToken: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: scene-runner
  namespace: scene
  labels:
    app.kubernetes.io/name: scene
    app.kubernetes.io/component: runner
automountServiceAccountToken: false
imagePullSecrets:
  # Dynamically generated Jobs inherit only this kubelet pull credential.
  - name: scene-registry
