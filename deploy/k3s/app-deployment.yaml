apiVersion: apps/v1
kind: Deployment
metadata:
  name: scene-app
  namespace: scene
  labels:
    app.kubernetes.io/name: scene
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: scene
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: scene
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scene
        app.kubernetes.io/component: app
        app.kubernetes.io/part-of: scene
    spec:
      serviceAccountName: scene-app
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/arch: amd64
      imagePullSecrets:
        - name: scene-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: scene
          image: scene-app-image
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: scene-runtime
            - secretRef:
                name: scene-app-aws
            - secretRef:
                name: scene-app-auth
          env:
            - name: SCENE_PROCESS_ROLE
              value: web
            # Only Traefik and runner pods can reach this container under the
            # namespace NetworkPolicies, so their forwarded scheme is trusted.
            - name: FORWARDED_ALLOW_IPS
              value: "*"
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            failureThreshold: 3
            periodSeconds: 15
            # collect_readiness has two sequential bounded phases of up to 4s.
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
              ephemeral-storage: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 2Gi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: scene
              app.kubernetes.io/component: app
